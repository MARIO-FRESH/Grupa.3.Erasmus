<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="rezervari.css">
</head>
<body>
    <header>
        <div class="logo">Tres Culturas</div>
        <nav>
            <ul>
                <li><a href="despre-noi.html">About</a></li>
                <li><a href="meniu.html">Menu</a></li>
                <li><a href="rezervari.html">Reservations</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
   
    <section id="rezervari" class="reservation">
        <h2>Book a table</h2>
        <p>Fill out the form to make a reservation.</p>
        <form class="reservation-form" action="index.html" method="get" id="reservationForm">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <input type="date" required>
            <input type="number" placeholder="Number of people" required>
            <button type="submit">Book now</button>
        </form>
    </section>

    <script>
        document.getElementById("reservationForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Previne trimiterea formularului
            window.location.href = "index.html"; // Redirecționează utilizatorul
        });
    </script>
</body>
</html>
